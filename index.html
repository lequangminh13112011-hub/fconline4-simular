<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FC Online 4 Ultimate - Full Database</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #111; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .top-bar { background: #0a285a; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #fde100; }
        .main { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar & Menu */
        .sidebar { width: 200px; background: #000; padding: 10px; border-right: 1px solid #333; }
        .menu-btn { width: 100%; padding: 12px; background: none; border: none; color: #ccc; text-align: left; cursor: pointer; font-weight: bold; }
        .menu-btn:hover, .menu-btn.active { color: #fde100; background: rgba(253, 225, 0, 0.1); }

        /* Màn hình chính */
        .content { flex: 1; padding: 20px; display: none; overflow-y: auto; position: relative; }
        .content.active { display: block; }

        /* Giao diện Sân bóng */
        .pitch { width: 100%; height: 400px; background: #27ae60; border: 3px solid #fff; border-radius: 10px; position: relative; margin-bottom: 20px; }
        .ball { width: 12px; height: 12px; background: #fff; border-radius: 50%; position: absolute; transition: 0.3s; box-shadow: 0 0 10px #fff; }

        /* Thẻ cầu thủ */
        .card { width: 140px; height: 200px; background: #fff; color: #000; border-radius: 8px; margin: 10px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; text-align: center; border: 2px solid #ddd; }
        .plus-8 { background: linear-gradient(135deg, #ffd700, #ff8c00) !important; color: #fff !important; box-shadow: 0 0 20px #ffd700; border: 2px solid #fff !important; }

        .btn { padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; margin: 5px; }
        .btn-gold { background: #fde100; color: #a50021; }
        .log-box { background: #000; padding: 10px; border-radius: 5px; height: 100px; overflow-y: auto; font-size: 13px; color: #2ecc71; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div><strong>FC ONLINE 4 CLONE</strong></div>
        <div style="color: #fde100;">Tài khoản: <span id="bpDisplay">1,000,000</span> BP</div>
    </div>

    <div class="main">
        <div class="sidebar">
            <button class="menu-btn active" onclick="showTab('tab-pack')">MỞ GÓI QUÀ</button>
            <button class="menu-btn" onclick="showTab('tab-match')">GIẢ LẬP XH</button>
            <button class="menu-btn" onclick="showTab('tab-upgrade')">NÂNG CẤP (+)</button>
        </div>

        <div id="tab-pack" class="content active">
            <h2>HỆ THỐNG GÓI CẦU THỦ</h2>
            <div id="newCard" class="card" style="display:none;">
                <div id="newName">?</div>
                <div style="font-size:30px">+1</div>
            </div>
            <button class="btn btn-gold" onclick="openPack()">MỞ GÓI TOP 100 (100,000 BP)</button>
        </div>

        <div id="tab-match" class="content">
            <div class="pitch" id="pitch">
                <div class="ball" id="ball" style="top:50%; left:50%;"></div>
            </div>
            <div id="score" style="font-size: 24px; text-align: center;">0 : 0</div>
            <button class="btn btn-gold" style="width:100%" onclick="startMatch()">BẮT ĐẦU TRẬN ĐẤU</button>
            <div class="log-box" id="matchLog">Sẵn sàng thi đấu...</div>
        </div>

        <div id="tab-upgrade" class="content">
            <h2>TRUNG TÂM NÂNG CẤP</h2>
            <div id="upCard" class="card">
                <div id="upName">CHƯA CÓ CẦU THỦ</div>
                <div id="upLv" style="font-size:40px">+0</div>
            </div>
            <button class="btn btn-gold" onclick="upgrade()">NÂNG CẤP (50,000 BP)</button>
            <button class="btn" style="background:#2ecc71; color:white;" onclick="sell()">BÁN LẤY TIỀN</button>
        </div>
    </div>

<script>
    // DATABASE TẤT CẢ CẦU THỦ
    const database = [
        "M. Salah", "V. Van Dijk", "L. Messi", "C. Ronaldo", "K. Mbappe", "E. Haaland", 
        "Kevin De Bruyne", "Neymar Jr", "Son Heung Min", "Harry Kane", "Robert Lewandowski",
        "Jude Bellingham", "Vinicius Jr", "Bruno Fernandes", "Alisson Becker", "S. Gerrard",
        "F. Torres", "Kaka", "Z. Zidane", "Ronaldo De Lima", "Pele", "D. Maradona"
    ];

    let bp = parseInt(localStorage.getItem('fco_bp')) || 1000000;
    let myPlayer = localStorage.getItem('fco_pName') || "Trống";
    let myLv = parseInt(localStorage.getItem('fco_pLv')) || 0;

    function updateUI() {
        document.getElementById('bpDisplay').innerText = bp.toLocaleString();
        document.getElementById('upName').innerText = myPlayer.toUpperCase();
        document.getElementById('upLv').innerText = "+" + myLv;
        
        const upCard = document.getElementById('upCard');
        upCard.className = "card";
        if(myLv >= 8) upCard.classList.add('plus-8');
        else if(myLv >= 5) upCard.style.background = "#c0c0c0";

        localStorage.setItem('fco_bp', bp);
        localStorage.setItem('fco_pName', myPlayer);
        localStorage.setItem('fco_pLv', myLv);
    }

    function showTab(tabId) {
        document.querySelectorAll('.content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function openPack() {
        if (bp < 100000) return alert("Không đủ tiền!");
        bp -= 100000;
        myPlayer = database[Math.floor(Math.random() * database.length)];
        myLv = 1;
        document.getElementById('newCard').style.display = "flex";
        document.getElementById('newName').innerText = myPlayer;
        updateUI();
    }

    function upgrade() {
        if (myLv === 0) return alert("Hãy mở gói trước!");
        if (bp < 50000) return alert("Không đủ tiền!");
        bp -= 50000;
        const rate = [1, 0.7, 0.5, 0.3, 0.15, 0.07, 0.03][myLv-1] || 0.01;
        if (Math.random() < rate) {
            myLv++;
            alert("THÀNH CÔNG LÊN +" + myLv);
        } else {
            myLv = 1;
            alert("THẤT BẠI VỀ +1");
        }
        updateUI();
    }

    function startMatch() {
        let scoreA = 0; let scoreB = 0; let time = 0;
        const log = document.getElementById('matchLog');
        log.innerHTML = "Trận đấu của " + myPlayer + " bắt đầu...<br>";
        
        const match = setInterval(() => {
            time += 10;
            const ball = document.getElementById('ball');
            ball.style.top = Math.random() * 90 + "%";
            ball.style.left = Math.random() * 90 + "%";
            
            if (Math.random() < 0.15) {
                scoreA++;
                log.innerHTML = "Phút " + time + "': " + myPlayer + " GHI BÀN!<br>" + log.innerHTML;
            }
            document.getElementById('score').innerText = scoreA + " : " + scoreB;
            
            if (time >= 90) {
                clearInterval(match);
                let reward = scoreA * 100000;
                bp += reward;
                alert("KẾT THÚC! Bạn ghi " + scoreA + " bàn và nhận " + reward.toLocaleString() + " BP");
                updateUI();
            }
        }, 500);
    }

    function sell() {
        if (myLv === 0) return;
        let price = 200000 * Math.pow(3, myLv - 1);
        bp += Math.floor(price);
        myPlayer = "Trống"; myLv = 0;
        updateUI();
    }

    updateUI();
</script>
</body>
</html><button class="btn" style="background: #444; color: white; margin-top: 10px;" onclick="exitMatch()">THOÁT RA MENU</button>
