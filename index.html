<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FC Online - Match Engine</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .top-bar { background: #0a285a; height: 50px; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #3498db; }
        .container { display: flex; height: calc(100vh - 50px); }
        
        /* Sân vận động 2D */
        .pitch { flex: 2; background: #2ecc71; position: relative; border: 5px solid white; margin: 20px; border-radius: 10px; overflow: hidden; }
        .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; border: 2px solid white; border-radius: 50%; }
        .half-line { position: absolute; top: 50%; width: 100%; height: 2px; background: white; }
        .ball { position: absolute; width: 12px; height: 12px; background: white; border-radius: 50%; transition: 0.5s; z-index: 10; }
        .player { position: absolute; width: 20px; height: 20px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .team-a { background: red; color: white; }
        .team-b { background: blue; color: white; }

        /* Bảng điều khiển */
        .sidebar { flex: 1; background: rgba(0,0,0,0.8); padding: 20px; border-left: 2px solid #444; }
        .score-board { font-size: 30px; text-align: center; margin-bottom: 20px; background: #333; padding: 10px; border-radius: 5px; }
        .log { height: 200px; overflow-y: auto; background: #111; padding: 10px; font-size: 13px; color: #aaa; margin-bottom: 20px; border-radius: 5px; }
        .btn { width: 100%; padding: 15px; background: #fde100; color: #a50021; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="top-bar">
    <span>FC ONLINE: CHẾ ĐỘ GIẢ LẬP XH</span>
    <span style="margin-left: auto;">BP: <strong id="bpDisplay">1,000,000</strong></span>
</div>

<div class="container">
    <div class="pitch" id="pitch">
        <div class="half-line"></div>
        <div class="center-circle"></div>
        <div id="ball" class="ball"></div>
        </div>

    <div class="sidebar">
        <div class="score-board">
            <span id="scoreA">0</span> : <span id="scoreB">0</span>
        </div>
        <div id="matchTime" style="text-align:center; margin-bottom:10px;">Phút: 0</div>
        <div class="log" id="matchLog">Chào mừng đến với trận đấu...</div>
        <button id="startBtn" class="btn" onclick="startMatch()">BẮT ĐẦU TRẬN ĐẤU</button>
        <p style="font-size: 11px; color: #666; margin-top: 10px;">*Thắng nhận 500,000 BP, Hòa 200,000 BP</p>
    </div>
</div>

<script>
    let bp = parseInt(localStorage.getItem('fco_bp')) || 1000000;
    let scoreA = 0; let scoreB = 0;
    let matchInterval;
    let time = 0;

    function updateBP() {
        document.getElementById('bpDisplay').innerText = bp.toLocaleString();
        localStorage.setItem('fco_bp', bp);
    }

    function startMatch() {
        document.getElementById('startBtn').disabled = true;
        scoreA = 0; scoreB = 0; time = 0;
        document.getElementById('matchLog').innerHTML = "Trận đấu bắt đầu!<br>";
        
        matchInterval = setInterval(() => {
            time += 5;
            document.getElementById('matchTime').innerText = "Phút: " + time;
            
            // Di chuyển bóng ngẫu nhiên
            const ball = document.getElementById('ball');
            ball.style.left = Math.random() * 90 + "%";
            ball.style.top = Math.random() * 90 + "%";

            // Sự kiện ghi bàn ngẫu nhiên
            if (Math.random() < 0.1) {
                if (Math.random() > 0.5) {
                    scoreA++;
                    document.getElementById('scoreA').innerText = scoreA;
                    addLog(time + "': VÀOOO! Đội nhà ghi bàn!");
                } else {
                    scoreB++;
                    document.getElementById('scoreB').innerText = scoreB;
                    addLog(time + "': Đối thủ ghi bàn bất ngờ!");
                }
            }

            if (time >= 90) {
                clearInterval(matchInterval);
                endMatch();
            }
        }, 500);
    }

    function addLog(msg) {
        const log = document.getElementById('matchLog');
        log.innerHTML = msg + "<br>" + log.innerHTML;
    }

    function endMatch() {
        document.getElementById('startBtn').disabled = false;
        let reward = 0;
        if (scoreA > scoreB) {
            reward = 500000;
            alert("CHIẾN THẮNG! Bạn nhận được 500,000 BP");
        } else if (scoreA === scoreB) {
            reward = 200000;
            alert("HÒA! Bạn nhận được 200,000 BP");
        } else {
            alert("THẤT BẠI! Không nhận được thưởng.");
        }
        bp += reward;
        updateBP();
    }
    
    updateBP();
</script>
</body>
</html>
