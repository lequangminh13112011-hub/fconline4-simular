<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FC Online 4 - Fireworks Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000 url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=1400') no-repeat center center fixed; background-size: cover; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: -1; }
        
        /* Canvas Pháo hoa */
        #canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 100; }

        .top-bar { background: rgba(10, 40, 90, 0.95); height: 50px; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #fde100; }
        .container { display: flex; height: calc(100vh - 50px); padding: 20px; gap: 20px; }
        
        .sidebar { width: 220px; background: rgba(0,0,0,0.8); border-radius: 10px; padding: 10px; }
        .menu-btn { width: 100%; padding: 15px; background: none; border: none; color: #aaa; text-align: left; cursor: pointer; font-weight: bold; border-bottom: 1px solid #222; }
        .menu-btn.active { color: #fde100; border-left: 4px solid #fde100; background: rgba(255,255,255,0.05); }

        .content { flex: 1; background: rgba(0,0,0,0.7); border-radius: 15px; padding: 30px; display: none; text-align: center; position: relative; }
        .content.active { display: block; }

        /* Card Style */
        .card { width: 180px; height: 260px; background: #fff; color: #000; border-radius: 12px; margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; transition: 0.3s; position: relative; border: 4px solid #ddd; }
        .plus-8 { background: linear-gradient(135deg, #ffd700, #ff8c00) !important; color: #fff !important; box-shadow: 0 0 50px #ffd700; border: 3px solid #fff !important; transform: scale(1.1); }
        .shake { animation: shake 0.4s; border-color: #e74c3c !important; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }

        .btn { padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin: 10px; text-transform: uppercase; }
        .btn-gold { background: #fde100; color: #a50021; font-size: 16px; }
        .btn-blue { background: #3498db; color: white; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="overlay"></div>

    <div class="top-bar">
        <span style="font-weight:bold; letter-spacing:1px; color:#fde100;">FC ONLINE 4 PRO</span>
        <div style="margin-left: auto;">BP: <span id="bpDisplay" style="color:#fde100; font-weight:bold;">1,000,000</span></div>
    </div>

    <div class="container">
        <div class="sidebar">
            <button class="menu-btn active" onclick="showTab('tab-up')">NÂNG CẤP THẺ</button>
            <button class="menu-btn" onclick="showTab('tab-pack')">MỞ GÓI CẦU THỦ</button>
        </div>

        <div id="tab-up" class="content active">
            <h2 id="statusText">TRUNG TÂM NÂNG CẤP</h2>
            <div id="card" class="card">
                <div id="pName" style="font-size:1.2em;">TRỐNG</div>
                <div id="pLv" style="font-size:3em;">+0</div>
            </div>
            <p>Tỉ lệ hiện tại: <span id="rateText">--</span>%</p>
            <button class="btn btn-gold" onclick="upgrade()">ĐẬP THẺ (50K BP)</button>
        </div>

        <div id="tab-pack" class="content">
            <h2>MỞ GÓI LIVERPOOL ICON</h2>
            <div class="card" style="background:#34495e; color:white; border-color:#fde100;">
                <div>GÓI KIM CƯƠNG</div>
                <div style="font-size:0.8em; margin-top:10px;">TOP SIÊU SAO</div>
            </div>
            <button class="btn btn-blue" onclick="openPack()">MỞ GÓI (100K BP)</button>
        </div>
    </div>

<script>
    let bp = parseInt(localStorage.getItem('fco_bp')) || 2000000;
    let myP = localStorage.getItem('fco_pName') || "K. Dalglish";
    let myL = parseInt(localStorage.getItem('fco_pLv')) || 1;

    function updateUI() {
        document.getElementById('bpDisplay').innerText = bp.toLocaleString();
        document.getElementById('pName').innerText = myP.toUpperCase();
        document.getElementById('pLv').innerText = "+" + myL;
        
        const rates = [100, 80, 60, 40, 25, 15, 8];
        document.getElementById('rateText').innerText = rates[myL-1] || 1;

        const card = document.getElementById('card');
        card.className = "card";
        if (myL >= 8) card.classList.add('plus-8');
        else if (myL >= 5) card.style.background = "#c0c0c0";

        localStorage.setItem('fco_bp', bp);
        localStorage.setItem('fco_pName', myP);
        localStorage.setItem('fco_pLv', myL);
    }

    function showTab(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function openPack() {
        if (bp < 100000) return alert("Hết BP rồi!");
        bp -= 100000;
        const pool = ["M. Salah", "V. Van Dijk", "S. Gerrard", "F. Torres", "L. Suarez", "Xabi Alonso"];
        myP = pool[Math.floor(Math.random() * pool.length)];
        myL = 1;
        showTab('tab-up');
        updateUI();
    }

    function upgrade() {
        if (bp < 50000) return alert("Không đủ BP!");
        bp -= 50000;
        const rates = [1, 0.8, 0.6, 0.4, 0.25, 0.15, 0.08];
        const success = Math.random() < rates[myL-1];

        if (success) {
            myL++;
            document.getElementById('statusText').innerText = "THÀNH CÔNG RỰC RỠ!";
            document.getElementById('statusText').style.color = "#2ecc71";
            startFireworks(); // Bắn pháo hoa
        } else {
            myL = 1;
            document.getElementById('statusText').innerText = "THẤT BẠI - THẺ ĐÃ VỀ +1";
            document.getElementById('statusText').style.color = "#e74c3c";
            document.getElementById('card').classList.add('shake');
            setTimeout(() => document.getElementById('card').classList.remove('shake'), 400);
        }
        updateUI();
    }

    // --- LOGIC PHÁO HOA ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    function startFireworks() {
        for(let i=0; i<100; i++) {
            particles.push({
                x: window.innerWidth / 2,
                y: window.innerHeight / 2,
                vx: (Math.random()-0.5) * 10,
                vy: (Math.random()-0.5) * 10,
                color: `hsl(${Math.random()*360}, 100%, 50%)`,
                size: Math.random()*4 + 2,
                alpha: 1
            });
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.alpha -= 0.01;
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            if(p.alpha <= 0) particles.splice(i, 1);
        });
        requestAnimationFrame(animate);
    }
    animate();
    updateUI();
</script>
</body>
</html>
