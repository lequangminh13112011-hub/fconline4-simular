<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FC Online 4 Simulator - Pro Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000 url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=1400') no-repeat center center fixed;
            background-size: cover; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden;
        }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: -1; }

        /* Top Bar */
        .top-bar { background: rgba(10, 40, 90, 0.95); height: 50px; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #3498db; }
        .currency { margin-left: auto; color: #fde100; font-weight: bold; font-size: 18px; }

        /* Main Game Layout */
        .container { display: flex; justify-content: space-between; padding: 40px 100px; height: calc(100vh - 90px); }
        
        /* Menu Left */
        .sidebar { width: 250px; }
        .side-item { padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; border-radius: 5px; margin-bottom: 5px; text-transform: uppercase; }
        .side-item:hover { background: rgba(255,255,255,0.1); padding-left: 25px; color: #fde100; }
        .active { border-left: 5px solid #fde100; background: rgba(255,255,255,0.1); }

        /* Card Center */
        .card-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card { 
            width: 200px; height: 300px; background: #fff; color: #000; border-radius: 10px; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; 
            justify-content: center; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative;
        }
        .plus-8 { background: linear-gradient(135deg, #ffd700, #ff8c00) !important; color: #fff !important; box-shadow: 0 0 50px #ffd700; transform: scale(1.1); border: 2px solid white; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }

        /* Actions */
        .actions { width: 300px; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; border-top: 4px solid #a50021; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-up { background: #fde100; color: #a50021; font-size: 16px; }
        .btn-pack { background: #3498db; color: white; }
        .btn:active { transform: scale(0.95); }
        #status { margin-top: 15px; font-style: italic; color: #fde100; font-size: 14px; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="top-bar">
        <img src="https://upload.wikimedia.org/wikipedia/en/0/0c/Liverpool_FC.svg" width="30" style="margin-right: 15px;">
        <span style="font-weight:bold; letter-spacing:1px;">FC ONLINE 4 SIMULATOR</span>
        <div class="currency">BP: <span id="bpValue">1,000,000</span></div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="side-item active">Trung tâm đập thẻ</div>
            <div class="side-item">Thị trường chuyển nhượng</div>
            <div class="side-item">Mở gói quà</div>
            <div class="side-item">Quản lý đội hình</div>
        </div>

        <div class="card-zone">
            <div id="card" class="card">
                <div id="pName" style="font-size:18px; margin-bottom:10px;">CHỌN CẦU THỦ</div>
                <div id="pLv" style="font-size:60px;">+0</div>
            </div>
            <div id="status">Bắt đầu xây dựng đội hình Liverpool của bạn!</div>
        </div>

        <div class="actions">
            <button class="btn btn-pack" onclick="openPack()">Mở Gói Kim Cương (100k BP)</button>
            <button class="btn btn-up" onclick="upgrade()">Nâng Cấp Thẻ (30k BP)</button>
            <button class="btn" style="background:#2ecc71; color:white;" onclick="sell()">Bán Cầu Thủ</button>
            <button class="btn" style="background:#555; color:white; font-size:10px; padding:5px;" onclick="reset()">Reset Game</button>
        </div>
    </div>

    <script>
        // Hệ thống lưu trữ dữ liệu (Save Game)
        let bp = parseInt(localStorage.getItem('fco_bp')) || 1000000;
        let lv = 1;
        let currentP = localStorage.getItem('fco_player') || "K. DALGLISH";
        let baseP = 150000;

        const players = ["M. Salah", "V. Van Dijk", "S. Gerrard", "F. Torres", "Alisson", "Darwin Nunez"];

        function updateUI() {
            localStorage.setItem('fco_bp', bp);
            localStorage.setItem('fco_player', currentP);
            document.getElementById('bpValue').innerText = bp.toLocaleString();
            document.getElementById('pName').innerText = currentP.toUpperCase();
            document.getElementById('pLv').innerText = "+" + lv;
            
            const card = document.getElementById('card');
            card.className = "card";
            if (lv >= 8) card.classList.add('plus-8');
            else if (lv >= 5) card.style.background = "#c0c0c0";
            else card.style.background = "#fff";
        }

        function openPack() {
            if (bp < 100000) { alert("Không đủ BP!"); return; }
            bp -= 100000;
            currentP = players[Math.floor(Math.random()*players.length)];
            lv = 1;
            document.getElementById('status').innerText = "Bạn đã mở ra " + currentP + "!";
            updateUI();
        }

        function upgrade() {
            if (bp < 30000) { alert("Không đủ BP!"); return; }
            bp -= 30000;
            const card = document.getElementById('card');
            // Tỉ lệ đập thẻ ảo như thật
            const rates = [1, 0.7, 0.45, 0.25, 0.12, 0.05, 0.02];
            
            if (Math.random() < rates[lv-1]) {
                lv++;
                document.getElementById('status').innerText = "NÂNG CẤP THÀNH CÔNG! QUÁ ĐỈNH!";
            } else {
                lv = 1;
                document.getElementById('status').innerText = "XỊT RỒI! CHIA BUỒN VỚI BẠN.";
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 400);
            }
            updateUI();
        }

        function sell() {
            let price = baseP * Math.pow(3, lv-1);
            bp += Math.floor(price);
            document.getElementById('status').innerText = "Đã bán thu về " + Math.floor(price).toLocaleString() + " BP";
            lv = 1; currentP = "CHỌN CẦU THỦ";
            updateUI();
        }

        function reset() {
            if (confirm("Xóa hết tiền và làm lại từ đầu?")) {
                localStorage.clear();
                location.reload();
            }
        }

        updateUI();
    </script>
</body>
</html>
